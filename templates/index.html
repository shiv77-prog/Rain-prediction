<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rainfall Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🌧️ Rainfall Prediction</h1>

    <input type="number" id="cloud" placeholder="cloud">
    <input type="number" id="humidity" placeholder="Humidity">
    <input type="number" id="pressure" placeholder="Pressure">
    <input type="number" id="wind" placeholder="Wind Speed">
    <input type="number" id="direction" placeholder="winddirection">
    <input type="number" id="dewpoint" placeholder="dewpoint">
    <input type="number" id="Sunshine" placeholder="Sunshine">


    <button onclick="predict()">Predict</button>

    <h2 id="result"></h2>
</div>

<script>
function predict() {
   const data = {
    cloud: parseFloat(document.getElementById('cloud').value),
    humidity: parseFloat(document.getElementById('humidity').value),
    pressure: parseFloat(document.getElementById('pressure').value),
    wind_speed: parseFloat(document.getElementById('wind').value),        
    direction: parseFloat(document.getElementById('direction').value),    
    dewpoint: parseFloat(document.getElementById('dewpoint').value),      
    sunshine: parseFloat(document.getElementById('Sunshine').value)       
};

    fetch('/predict', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById('result').innerText = "Prediction: " + data.prediction;
    })
    .catch(err => {
        document.getElementById('result').innerText = "Error!";
        console.error(err);
    });
}
</script>
</body>
</html>
